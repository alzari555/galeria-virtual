<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CMS — Galería Virtual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/admin.css" />
  </head>
  <body>
    <header class="admin-header">
      <h1 class="admin-title">CMS — Gestión de obras</h1>
      <nav class="admin-nav">
        <a href="/" class="gallery-link">← Volver a la galería</a>
      </nav>
    </header>
    <main class="admin-main">
      <aside class="admin-sidebar">
        <h2>Obras</h2>
        <ul id="artwork-list" class="artwork-list"></ul>
        <button id="btn-new-artwork" class="btn btn-primary">+ Nueva obra</button>
        <div class="admin-actions">
          <button id="btn-export" class="btn btn-secondary">Exportar JSON</button>
          <button id="btn-import" class="btn btn-secondary">Importar JSON</button>
          <input type="file" id="import-file" accept=".json" hidden />
        </div>
      </aside>
      <section class="admin-editor">
        <form id="artwork-form" class="artwork-form" novalidate>
          <input type="hidden" id="field-id" />

          <div class="form-grid">
            <label class="field">
              Título
              <input type="text" id="field-title" required />
            </label>
            <label class="field">
              Artista
              <input type="text" id="field-artist" required />
            </label>
            <label class="field">
              Año
              <input type="number" id="field-year" min="1000" max="2100" />
            </label>
            <label class="field">
              Estado de venta
              <select id="field-status">
                <option value="">Sin especificar</option>
                <option value="available">Disponible</option>
                <option value="reserved">Reservado</option>
                <option value="sold">Vendido</option>
              </select>
            </label>
          </div>

          <fieldset>
            <legend>Dimensiones (cm)</legend>
            <div class="form-row">
              <label class="field">
                Ancho
                <input type="number" id="field-width" min="1" step="0.1" required />
              </label>
              <label class="field">
                Alto
                <input type="number" id="field-height" min="1" step="0.1" required />
              </label>
            </div>
          </fieldset>

          <div class="form-row">
            <label class="field">
              Material
              <input type="text" id="field-material" placeholder="Óleo, acrílico, temple..." />
            </label>
            <label class="field">
              Técnica
              <input type="text" id="field-technique" placeholder="Sobre lienzo, sobre tabla..." />
            </label>
          </div>

          <label class="field">
            Imagen
            <input type="file" id="field-image" accept="image/*" />
            <small class="field-hint">
              Seleccioná una imagen de la carpeta <code>public/images/</code> o subí una nueva.
              La ruta se almacenará relativa al proyecto.
            </small>
          </label>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <button type="button" id="btn-delete" class="btn btn-danger" hidden>Eliminar obra</button>
          </div>
        </form>

        <div id="preview-container" class="preview-container">
          <h3>Previsualización</h3>
          <div id="preview-canvas"></div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/admin.ts"></script>
  </body>
</html>
